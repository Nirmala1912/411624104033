<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Frontend</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }

        header {
            background: #0078ff;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            width: 300px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            margin-top: 0;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Simple Website</h1>
        <p>Welcome to my image gallery</p>
    </header>

    <div class="container">

        <div class="card">
            <img src="https://picsum.photos/300/200?random=1" alt="Image 1">
            <div class="card-content">
                <h3>Nature</h3>
                <p>Beautiful scenery and landscapes.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?random=2" alt="Image 2">
            <div class="card-content">
                <h3>Mountains</h3>
                <p>Explore amazing mountain views.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?random=3" alt="Image 3">
            <div class="card-content">
                <h3>Travel</h3>
                <p>Discover exciting destinations.</p>
            </div>
        </div>

    </div>

    <footer>
        &copy; 2026 My Website
    </footer>

</body>
</html>
